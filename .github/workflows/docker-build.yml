name: Docker Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker compose build
      - run: docker compose up -d
      - run: sleep 5 && curl -f http://localhost:8000/health
      - run: docker compose down
