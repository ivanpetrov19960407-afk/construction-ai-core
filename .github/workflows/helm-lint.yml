name: Helm Lint

on:
  push:
    paths:
      - 'helm/**'
      - '.github/workflows/helm-lint.yml'
  pull_request:
    paths:
      - 'helm/**'
      - '.github/workflows/helm-lint.yml'

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint (strict)
        run: helm lint helm/* --strict

      - name: Helm template validation (default)
        run: helm template helm/construction-ai/ --values helm/construction-ai/values.yaml > /dev/null

      - name: Helm template validation (example)
        run: helm template helm/construction-ai/ --values helm/construction-ai/values.ci.yaml > /dev/null
