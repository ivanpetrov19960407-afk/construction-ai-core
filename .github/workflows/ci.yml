name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux deps for Tauri Rust checks
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Install desktop deps
        working-directory: desktop
        run: npm install --no-audit --no-fund
      - name: Run pre-commit
        run: pre-commit run --all-files

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev --no-install-project
      - run: uv run --no-project mypy --strict core/ api/

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    timeout-minutes: 30
    env:
      DEFAULT_LLM_PROVIDER: openai
      OPENAI_API_KEY: test-key
      API_KEYS: '["test-key"]'
      JWT_SECRET: this-is-a-test-jwt-secret-with-32chars!
      SQLITE_DB_PATH: ':memory:'
      RAG_EMBEDDINGS_BACKEND: hash
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev --no-install-project
      - run: >-
          uv run --no-project pytest tests/ -v --tb=short
          -p timeout --timeout=120 -o faulthandler_timeout=60
          --ignore=tests/test_rag_engine.py
          --cov=api --cov=core --cov-report=xml --cov-report=term
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  smoke:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    env:
      DEFAULT_LLM_PROVIDER: openai
      OPENAI_API_KEY: test-key
      API_KEYS: '["test-key"]'
      JWT_SECRET: this-is-a-test-jwt-secret-with-32chars!
      SQLITE_DB_PATH: ':memory:'
      RAG_EMBEDDINGS_BACKEND: hash
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev --no-install-project
      - run: uv run --no-project pytest tests/test_smoke_api.py -q

  alembic:
    runs-on: ubuntu-latest
    needs: typecheck
    timeout-minutes: 10
    env:
      DATABASE_URL: sqlite:///./construction_ai_ci.db
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev --no-install-project
      - run: |
          uv run --no-project alembic upgrade head
          uv run --no-project alembic check

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: construction-ai-core:ci

  helm:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Helm lint strict
        run: helm lint helm/* --strict
      - name: Helm template validation (default values)
        run: helm template helm/construction-ai/ --values helm/construction-ai/values.yaml > /dev/null
      - name: Helm template validation (example CI values)
        run: helm template helm/construction-ai/ --values helm/construction-ai/values.ci.yaml > /dev/null
