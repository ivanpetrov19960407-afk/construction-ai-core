name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev --no-install-project
      - run: uv run --no-project ruff check .
      - run: uv run --no-project ruff format --check .
      - run: uv run --no-project mypy core/ agents/ api/ --ignore-missing-imports

  alembic:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/construction_ai_ci
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: construction_ai_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d construction_ai_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev --no-install-project
      - name: Apply all migrations
        run: uv run --no-project alembic upgrade head
      - name: Verify migration drift
        run: |
          if uv run --no-project alembic --help | grep -q "check"; then
            uv run --no-project alembic check
          else
            uv run --no-project python scripts/alembic_schema_check.py
          fi

  test:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    env:
      DEFAULT_LLM_PROVIDER: openai
      OPENAI_API_KEY: "test-key"
      API_KEYS: '["test-key"]'
      SQLITE_DB_PATH: ":memory:"
      RAG_EMBEDDINGS_BACKEND: hash
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev --no-install-project
      - run: >-
          uv run --no-project pytest tests/ -v --tb=short
          -p timeout --timeout=120 -o faulthandler_timeout=60
          --ignore=tests/test_rag_engine.py
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: .pytest_cache/

  helm:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Helm lint
        run: helm lint helm/construction-ai/
      - name: Helm template validation
        run: helm template helm/construction-ai/ > /dev/null
