name: CI

on: [push, pull_request]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            migrations:
              - 'migrations/**'

  precommit:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies for Tauri checks
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            pkg-config \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: uv sync --extra dev --no-install-project
      - run: npm --prefix desktop install
      - run: uv run --no-project pre-commit run --all-files

  lint:
    runs-on: ubuntu-latest
    needs: precommit
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev --no-install-project
      - run: uv run --no-project ruff check core/ api/ agents/ schemas/
      - run: uv run --no-project ruff format --check core/ api/ agents/ schemas/

  typecheck:
    runs-on: ubuntu-latest
    needs: precommit
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev --no-install-project
      - run: uv run --no-project mypy core/ api/
      - run: uv run --no-project mypy agents/researcher/ schemas/research.py

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    timeout-minutes: 30
    env:
      DEFAULT_LLM_PROVIDER: openai
      OPENAI_API_KEY: "test-key"
      API_KEYS: '["test-key"]'
      SQLITE_DB_PATH: ":memory:"
      RAG_EMBEDDINGS_BACKEND: hash
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev --no-install-project
      - run: >-
          uv run --no-project pytest tests/ -v --tb=short
          -p timeout --timeout=120 -o faulthandler_timeout=60
          --ignore=tests/test_rag_engine.py
      - run: uv run --no-project pytest tests/test_smoke_api.py -q
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: .pytest_cache/

  smoke:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev --no-install-project
      - run: uv run --no-project pytest tests/test_health.py -v --tb=short

  alembic:
    runs-on: ubuntu-latest
    needs: [changes, lint, typecheck]
    if: needs.changes.outputs.migrations == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --extra dev --no-install-project
      - run: uv run --no-project python -m compileall migrations
