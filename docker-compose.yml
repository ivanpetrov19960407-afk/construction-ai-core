version: "3.9"

services:
  # ── Construction AI Core API ─────────────────
  api:
    build: .
    container_name: construction-ai-core
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./templates:/app/templates
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Redis (только для серверного деплоя) ─────
  # Раскомментировать при переходе к Фазе 4+
  # redis:
  #   image: redis:7-alpine
  #   container_name: construction-ai-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   restart: unless-stopped


  telegram-bot:
    image: python:3.11-slim
    container_name: construction-ai-telegram-bot
    working_dir: /app
    command: python -m telegram.bot
    depends_on:
      - api
    env_file:
      - .env
    volumes:
      - .:/app
    restart: unless-stopped

