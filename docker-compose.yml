services:
  # ── Construction AI Core API ─────────────────
  api:
    build: .
    container_name: construction-ai-core
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
      - ./data/chroma:/app/data/chroma
      - ./templates:/app/templates
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Redis (только для серверного деплоя) ─────
  # Раскомментировать при переходе к Фазе 4+
  # redis:
  #   image: redis:7-alpine
  #   container_name: construction-ai-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   restart: unless-stopped


  telegram-bot:
    image: python:3.11-slim
    container_name: construction-ai-telegram-bot
    working_dir: /app
    command: python -m telegram.bot
    depends_on:
      - api
    env_file:
      - path: .env
        required: false
    environment:
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
    volumes:
      - .:/app
    restart: unless-stopped
# volumes:
#   redis_data:

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

